name: Test and validate (staging)
on:
  push:
    branches:
    - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  run:
    name: Python ${{ matrix.python-version }} on ${{ startsWith(matrix.os, 'macos-') && 'macOS' || 'Linux' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Zig
      run: |
        set -e
        ZIG_VERSION="0.16.0"
        if [ "$(uname)" = "Darwin" ]; then
          RAW_ARCH=$(uname -m)
          if [ "$RAW_ARCH" = "arm64" ]; then ZIG_ARCH="aarch64"; else ZIG_ARCH="$RAW_ARCH"; fi
          brew install xz || true
          curl -fL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ZIG_ARCH}-macos-${ZIG_VERSION}.tar.xz" \
            -o "/tmp/zig.tar.xz"
          tar -xJf "/tmp/zig.tar.xz" -C /tmp
          sudo ln -sf "/tmp/zig-${ZIG_ARCH}-macos-${ZIG_VERSION}/zig" /usr/local/bin/zig
        else
          ARCH=$(uname -m)
          sudo apt-get install -y xz-utils 2>/dev/null || true
          curl -fL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ARCH}-linux-${ZIG_VERSION}.tar.xz" \
            -o "/tmp/zig.tar.xz"
          tar -xJf "/tmp/zig.tar.xz" -C /tmp
          sudo ln -sf "/tmp/zig-${ARCH}-linux-${ZIG_VERSION}/zig" /usr/local/bin/zig
        fi
        zig version

    - name: Install package
      run: pip install -e ".[tests]"

    - name: Run tests
      run: python -m pytest tests/ -x -q
