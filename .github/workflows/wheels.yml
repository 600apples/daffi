name: Build & Publish Wheels

on:
  push:
    tags:
      - "v*"           # trigger on version tags, e.g. v0.1.0
  workflow_dispatch:   # allow manual runs from the Actions UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build binary wheels ─────────────────────────────────────────────────────
  build-wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest   # Linux x86_64 + aarch64 (via QEMU)
          - macos-13        # macOS x86_64 (Intel)
          - macos-14        # macOS arm64  (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      # ── QEMU for Linux aarch64 cross-build ──────────────────────────────────
      - name: Set up QEMU (Linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64

      # ── Build wheels ─────────────────────────────────────────────────────────
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # cibuildwheel reads [tool.cibuildwheel] from pyproject.toml
          CIBW_BUILD_VERBOSITY: 1

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ── Build source distribution ───────────────────────────────────────────────
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI ─────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    # Only publish on a real version tag, not on manual workflow_dispatch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/daffi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (no API token needed)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
