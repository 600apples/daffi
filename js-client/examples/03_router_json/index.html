<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>daffi — JS caller via Router · JSON</title>
  <script src="../../app.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; background: #0f0f0f; color: #e0e0e0; }
    h1   { color: #7dd3fc; margin-bottom: 4px; }
    p    { color: #94a3b8; margin-top: 0; }
    .badge { display: inline-block; background: #1d4ed8; color: #bfdbfe; font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; margin-left: 8px; vertical-align: middle; }
    .card { background: #1e1e2e; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.85rem; }
    input[type=text] { background: #13131f; border: 1px solid #374151; border-radius: 6px; color: #e0e0e0; padding: 6px 10px; width: 200px; margin-right: 6px; }
    button { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 7px 16px; cursor: pointer; font-size: 0.9rem; margin-right: 6px; }
    button:disabled { background: #374151; cursor: not-allowed; }
    button.connect { background: #10b981; }
    button.danger  { background: #ef4444; }
    #log { background: #13131f; border-radius: 6px; padding: 12px; min-height: 120px; font-family: monospace; font-size: 0.82rem; white-space: pre-wrap; color: #a0aec0; overflow-y: auto; max-height: 260px; }
    .ok  { color: #34d399; }
    .err { color: #f87171; }
    .inf { color: #60a5fa; }
  </style>
</head>
<body>

<h1>daffi browser caller — Router <span class="badge">JSON</span></h1>
<p>Browser → Router → Python worker. The Python worker runs the callbacks.</p>

<div class="card">
  <label>Router WebSocket URL</label>
  <input type="text" id="wsUrl" value="ws://127.0.0.1:6010" style="width:220px">
  <button class="connect" id="btnConnect">Connect</button>
  <button class="danger"  id="btnDisconnect" disabled>Disconnect</button>
</div>

<div class="card">
  <label>reverse(text)</label>
  <input type="text" id="reverseText" value="hello daffi">
  <button id="btnReverse" disabled>Call reverse()</button>
</div>

<div class="card">
  <label>word_count(text)</label>
  <input type="text" id="wcText" value="the quick brown fox jumps">
  <button id="btnWc" disabled>Call word_count()</button>
</div>

<div class="card">
  <label>Log</label>
  <div id="log"></div>
</div>

<script>
  const log = (msg, cls) => {
    const el = document.getElementById('log');
    el.innerHTML += `<span class="${cls||''}">${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
  };

  let conn = null;

  document.getElementById('btnConnect').onclick = async () => {
    const url = document.getElementById('wsUrl').value;
    log(`Connecting to router at ${url} …`, 'inf');
    try {
      const client = new DaffiClient('browser-json-caller', {
        wsUrl:    url,
        wasmPath: '/zig-out/lib/app.wasm',
      });
      client.addEventHandler(e => log(`event: ${e.member} → ${e.type}`, 'inf'));
      conn = await client.connect();
      log('Connected to router!', 'ok');
      ['btnReverse','btnWc','btnDisconnect'].forEach(id => document.getElementById(id).disabled = false);
      document.getElementById('btnConnect').disabled = true;
    } catch (err) {
      log(`Connect failed: ${err}`, 'err');
    }
  };

  document.getElementById('btnDisconnect').onclick = () => {
    conn = null;
    log('Disconnected.', 'inf');
    ['btnReverse','btnWc','btnDisconnect'].forEach(id => document.getElementById(id).disabled = true);
    document.getElementById('btnConnect').disabled = false;
  };

  document.getElementById('btnReverse').onclick = async () => {
    const text = document.getElementById('reverseText').value;
    log(`→ reverse(${JSON.stringify(text)}) …`);
    try {
      const result = await conn.rpc({ serde: 'json', timeout: 5000 }).reverse(text);
      log(`← reverse = ${JSON.stringify(result)}`, 'ok');
    } catch (err) { log(`Error: ${err}`, 'err'); }
  };

  document.getElementById('btnWc').onclick = async () => {
    const text = document.getElementById('wcText').value;
    log(`→ word_count(${JSON.stringify(text)}) …`);
    try {
      const result = await conn.rpc({ serde: 'json', timeout: 5000 }).word_count(text);
      log(`← word_count = ${result}`, 'ok');
    } catch (err) { log(`Error: ${err}`, 'err'); }
  };
</script>
</body>
</html>
