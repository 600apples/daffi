site_name: daffi
site_url: https://600apples.github.io/daffi/
site_dir: mkdocs_files
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  logo: images/logo.png
  favicon: images/logo.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Getting Started: getting-started.md
  - Python API:
    - Client → Service: usage/service.md
    - Client → Router → Worker: usage/router.md
    - Call Styles — rpc vs cast: usage/call-styles.md
    - Serialization: usage/serialization.md
    - Events: usage/events.md
    - Unix Sockets: usage/unix-sockets.md
    - TLS: usage/tls.md
  - JavaScript Client: js-client.md

plugins:
  - search
  - section-index

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
