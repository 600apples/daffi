[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "daffi"
version = "0.1.0"
description = "Lightweight inter-process RPC framework with a Zig native core"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Volodymyr Boiko", email = "600apples@gmail.com" },
]
keywords = ["rpc", "ipc", "distributed", "messaging", "networking", "zig"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
    "Topic :: System :: Networking",
]
dependencies = []

[project.optional-dependencies]
msgpack = ["msgpack>=1.0"]

[project.urls]
Homepage    = "https://github.com/600apples/dafi"
Source      = "https://github.com/600apples/dafi"
"Bug Tracker" = "https://github.com/600apples/dafi/issues"

[tool.setuptools.packages.find]
include = ["daffi*"]


[tool.cibuildwheel]
# CPython 3.10 – 3.13; skip PyPy, 32-bit, and musl (Windows handled separately)
build  = "cp310-* cp311-* cp312-* cp313-*"
skip   = "pp* *i686* *musllinux*"

# Install the wheel after building to run a quick smoke test
test-command = "python -c \"import daffi; print('daffi', daffi.__version__)\""

# ── Linux ─────────────────────────────────────────────────────────────────────
[tool.cibuildwheel.linux]
archs         = ["x86_64", "aarch64"]
# Use manylinux_2_28 (AlmaLinux 8 based) — modern enough for Zig 0.16
manylinux-x86_64-image  = "quay.io/pypa/manylinux_2_28_x86_64"
manylinux-aarch64-image = "quay.io/pypa/manylinux_2_28_aarch64"

before-all = """
    ARCH=$(uname -m)
    ZIG_VERSION="0.16.0"
    ZIG_TAR="zig-linux-${ARCH}-${ZIG_VERSION}.tar.xz"
    curl -fL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_TAR}" \
        | tar -xJ -C /opt
    ln -sf "/opt/zig-linux-${ARCH}-${ZIG_VERSION}/zig" /usr/local/bin/zig
    zig version
"""

# auditwheel repair bundles libssl/libcrypto into the wheel automatically
repair-wheel-command = "auditwheel repair -w {dest_dir} {wheel}"

# ── macOS ─────────────────────────────────────────────────────────────────────
[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]

before-all = """
    brew install openssl@3 || true

    # Map uname -m (arm64) to Zig's arch name (aarch64)
    RAW_ARCH=$(uname -m)
    if [ "$RAW_ARCH" = "arm64" ]; then ZIG_ARCH="aarch64"; else ZIG_ARCH="$RAW_ARCH"; fi

    ZIG_VERSION="0.16.0"
    ZIG_TAR="zig-macos-${ZIG_ARCH}-${ZIG_VERSION}.tar.xz"
    curl -fL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_TAR}" \
        | tar -xJ -C /opt
    sudo ln -sf "/opt/zig-macos-${ZIG_ARCH}-${ZIG_VERSION}/zig" /usr/local/bin/zig
    zig version
"""

# delocate bundles dylibs into the wheel automatically
repair-wheel-command = "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} {wheel}"
